<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUPIN Collection</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{

background:#f7f6f3;
color:#222;

}

header{

padding:60px 25px 40px;
text-align:center;

}

.logo{

width:90px;
height:90px;
border-radius:50%;
margin:auto;
margin-bottom:18px;
overflow:hidden;

}

.logo img{

width:100%;
height:100%;
object-fit:cover;

}

h1{

font-size:34px;
font-weight:300;
letter-spacing:2px;

}

p{

margin-top:12px;
font-size:15px;
color:#666;

}

.botao{

display:inline-block;
margin-top:25px;
padding:14px 32px;
border-radius:30px;
background:black;
color:white;
text-decoration:none;
font-weight:500;

}

section{

padding:20px;

}

h2{

font-size:22px;
margin-bottom:20px;

}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:18px;

}

.card{

background:white;
border-radius:22px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.08);

}

.card img{

width:100%;

display:block;

}

.info{

padding:18px;

}

.nome{

font-size:18px;
font-weight:600;

}

.preco{

margin-top:8px;
font-size:22px;
font-weight:700;

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="logo.png">

</div>

<h1>LUPIN</h1>

<p>Todo movimento importa.</p>

<a class="botao" href="#">Comprar pelo WhatsApp</a>

</header>

<section>

<h2>Nova Coleção</h2>

<div class="grid">

</div>

</section>

</body>

</html>
